services:
  redis:
    image: redis:7-alpine
    container_name: relaychat-redis
    ports:
      - "6379:6379"
    networks:
      - relaychat-network
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  mongodb:
    image: mongo:7
    container_name: relaychat-mongo
    ports:
      - "27017:27017"
    networks:
      - relaychat-network
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: test_database

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: relaychat-backend
    ports:
      - "8001:8001"
    networks:
      - relaychat-network
    depends_on:
      - redis
      - mongodb
    environment:
      MONGO_URL: mongodb://mongodb:27017
      REDIS_URL: redis://redis:6379
      DB_NAME: test_database
      CORS_ORIGINS: "*"
    volumes:
      - ./backend:/app
    command: uvicorn server:app --host 0.0.0.0 --port 8001 --reload

networks:
  relaychat-network:
    driver: bridge

volumes:
  redis-data:
  mongo-data:
